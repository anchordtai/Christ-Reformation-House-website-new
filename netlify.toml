# Static site only – no Netlify Functions. API is your own Express backend.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# SPA: serve index.html for all routes (e.g. /donate/return after payment redirect)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
